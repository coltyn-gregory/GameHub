@if (loading()) {
  <p class="text-center text-muted">Loading…</p>
} @else {
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <h2 class="mb-4">Edit Game</h2>

      @if (error()) {
        <ngb-alert type="danger" [dismissible]="false">{{ error() }}</ngb-alert>
      }

      <form (ngSubmit)="save()">
        <div class="mb-3">
          <label for="title" class="form-label">Title</label>
          <input
            id="title"
            type="text"
            class="form-control"
            [ngModel]="title()"
            (ngModelChange)="title.set($event)"
            name="title"
            required
          />
        </div>

        <div class="mb-3">
          <label for="studio" class="form-label">Studio</label>
          <select
            id="studio"
            class="form-select"
            [ngModel]="studioId()"
            (ngModelChange)="studioId.set($event)"
            name="studio"
          >
            @for (studio of studios(); track studio.id) {
              <option [value]="studio.id">{{ studio.name }}</option>
            }
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label">Platforms</label>
          @for (platform of platforms(); track platform.id) {
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                [id]="'platform-' + platform.id"
                [checked]="isPlatformSelected(platform.id)"
                (change)="togglePlatform(platform.id, $any($event.target).checked)"
              />
              <label class="form-check-label" [for]="'platform-' + platform.id">
                {{ platform.name }}
              </label>
            </div>
          }
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            {{ saving() ? 'Saving…' : 'Save' }}
          </button>
          <a routerLink="/" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
}
