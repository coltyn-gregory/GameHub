<div class="row justify-content-center mb-4 g-3">
  <div class="col-12 col-md-4 col-lg-3">
    <label for="platformFilter" class="form-label">Filter by platform</label>
    <select
      id="platformFilter"
      class="form-select"
      [value]="selectedPlatformId()"
      (change)="onPlatformChange($any($event.target).value)"
    >
      <option value="">All platforms</option>
      @for (platform of platforms(); track platform.id) {
        <option [value]="platform.id">{{ platform.name }}</option>
      }
    </select>
  </div>
  <div class="col-12 col-md-4 col-lg-3">
    <label for="studioFilter" class="form-label">Filter by studio</label>
    <select
      id="studioFilter"
      class="form-select"
      [value]="selectedStudioId()"
      (change)="onStudioChange($any($event.target).value)"
    >
      <option value="">All studios</option>
      @for (studio of studios(); track studio.id) {
        <option [value]="studio.id">{{ studio.name }}</option>
      }
    </select>
  </div>
</div>

@if (loading()) {
  <p class="text-center text-muted">Loading games…</p>
} @else if (error()) {
  <ngb-alert type="danger" [dismissible]="false">{{ error() }}</ngb-alert>
} @else {
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3 justify-content-center">
    @for (game of games(); track game.id) {
      <div class="col">
        <div class="card h-100 game-card position-relative">
          <a
            [routerLink]="['/games', game.id, 'edit']"
            class="btn btn-sm btn-outline-primary position-absolute top-0 end-0 m-2"
          >
            Edit
          </a>
          <div class="card-body">
            <h5 class="card-title">{{ game.title }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">Studio: {{ game.studio.name }}</h6>
            <div class="d-flex flex-wrap gap-1 mt-2">
              @for (platform of game.platforms; track platform.id) {
                <span class="badge text-bg-secondary">{{ platform.name }}</span>
              }
            </div>
          </div>
        </div>
      </div>
    } @empty {
      <p class="text-muted">No games found.</p>
    }
  </div>
}
